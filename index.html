<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>File Explorer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* header */
header {
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

/* search */
.search {
  padding: 15px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

/* grid */
.container {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.file {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
}

.file:hover {
  background: #334155;
  transform: translateY(-3px);
}

.icon {
  font-size: 30px;
}

/* modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #020617;
  padding: 20px;
  width: 70%;
  max-height: 70%;
  overflow: auto;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
  color: red;
}
</style>
</head>

<body>

<header>📁 My Explorer</header>

<div class="search">
  <input type="text" id="search" placeholder="Поиск файлов...">
</div>

<div class="container" id="list"></div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">❌</span>
    <pre id="content"></pre>
  </div>
</div>

<script>
// 🔹 файлы (можешь менять)
const files = [
  { name: "test.txt", icon: "📄" },
  { name: "data.json", icon: "🧾" },
  { name: "info.txt", icon: "📄" }
];

const list = document.getElementById("list");

// render
function render(data) {
  list.innerHTML = "";
  data.forEach(f => {
    const div = document.createElement("div");
    div.className = "file";
    div.innerHTML = `
      <div class="icon">${f.icon}</div>
      <div>${f.name}</div>
    `;
    div.onclick = () => openFile(f.name);
    list.appendChild(div);
  });
}

render(files);

// open file
function openFile(name) {
  fetch(name)
    .then(res => res.text())
    .then(text => {
      document.getElementById("content").textContent = text;
      document.getElementById("modal").style.display = "flex";
    })
    .catch(() => {
      document.getElementById("content").textContent = "Ошибка загрузки";
      document.getElementById("modal").style.display = "flex";
    });
}

// close modal
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// search
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  render(files.filter(f => f.name.toLowerCase().includes(val)));
});
</script>

</body>
</html>
